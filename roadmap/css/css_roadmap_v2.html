
<style>
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
#wrap{padding:1rem 0}
#prog-row{display:flex;justify-content:space-between;margin-bottom:7px}
#prog-lbl{font-size:13px;color:var(--color-text-secondary)}
#prog-num{font-size:13px;font-weight:500;color:var(--color-text-primary)}
#prog-track{height:5px;background:var(--color-border-tertiary);border-radius:3px;overflow:hidden;margin-bottom:1.5rem}
#prog-fill{height:100%;width:0;background:#1D9E75;border-radius:3px;transition:width .4s}
#pnav{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1.75rem}
#pnav button{padding:4px 11px;border-radius:999px;font-size:11px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);font-family:var(--font-sans);transition:all .15s}
#pnav button:hover{background:var(--color-background-secondary)}
.ph-sec{margin-bottom:2.5rem}
.ph-head{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--border-radius-md);margin-bottom:12px;border-left:3px solid}
.ph-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.ph-name{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.ph-desc{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.ph-dur{margin-left:auto;font-size:11px;color:var(--color-text-tertiary);background:var(--color-background-secondary);padding:3px 8px;border-radius:999px;white-space:nowrap}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;transition:border-color .15s}
.card:hover{border-color:var(--color-border-secondary)}
.card.done .card-head{opacity:.45}
.card-head{padding:12px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.chk{width:17px;height:17px;border:1.5px solid var(--color-border-secondary);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;cursor:pointer}
.chk.on{background:#1D9E75;border-color:#1D9E75;color:#fff}
.ci{flex:1}
.ct{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px;line-height:1.3}
.cd{font-size:12px;color:var(--color-text-secondary)}
.cm{display:flex;gap:8px;margin-top:7px}
.ctime{font-size:11px;color:var(--color-text-tertiary)}
.ccnt{font-size:11px;padding:2px 7px;background:var(--color-background-secondary);border-radius:4px;color:var(--color-text-tertiary)}
.cbody{display:none;border-top:0.5px solid var(--color-border-tertiary);padding:10px 14px 12px}
.cbody.open{display:block}
.subs{list-style:none;margin-bottom:10px}
.subs li{font-size:12px;color:var(--color-text-secondary);padding:4px 0 4px 12px;border-left:1.5px solid var(--color-border-tertiary);margin-bottom:3px;line-height:1.55}
.askbtn{width:100%;padding:7px 12px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);cursor:pointer;color:var(--color-text-secondary);text-align:left;font-family:var(--font-sans);transition:all .15s}
.askbtn:hover{background:var(--color-background-tertiary);color:var(--color-text-primary)}
</style>

function g(id){return document.getElementById(id);}
function mk(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}
function tx(tag,cls,text){var e=mk(tag,cls);e.textContent=text;return e;}

function updateProg(){
  var total=P.reduce(function(s,p){return s+p.T.length;},0);
  var d=DONE.size;
  g('prog-fill').style.width=(total?d/total*100:0).toFixed(1)+'%';
  g('prog-num').textContent=d+' / '+total+' тем';
}

function buildCard(t){
  var card=mk('div','card');
  var head=mk('div','card-head');
  var chk=mk('div','chk');
  var ci=mk('div','ci');
  var cm=mk('div','cm');
  cm.appendChild(tx('span','ctime',t.time));
  var cnt=tx('span','ccnt',t.s.length+' подтем');
  cm.appendChild(cnt);
  ci.appendChild(tx('div','ct',t.t));
  ci.appendChild(tx('div','cd',t.d));
  ci.appendChild(cm);
  head.appendChild(chk);
  head.appendChild(ci);
  var body=mk('div','cbody');
  var ul=mk('ul','subs');
  t.s.forEach(function(text){ul.appendChild(tx('li',null,text));});
  var btn=tx('button','askbtn','Спросить ментора по этой теме ↗');
  body.appendChild(ul);
  body.appendChild(btn);
  card.appendChild(head);
  card.appendChild(body);
  head.addEventListener('click',function(e){
    if(e.target===chk||chk.contains(e.target))return;
    body.classList.toggle('open');
  });
  chk.addEventListener('click',function(){
    if(DONE.has(t.id))DONE.delete(t.id);else DONE.add(t.id);
    var on=DONE.has(t.id);
    chk.classList.toggle('on',on);
    chk.textContent=on?'✓':'';
    card.classList.toggle('done',on);
    updateProg();
  });
  btn.addEventListener('click',function(){sendPrompt(t.ask);});
  return card;
}

function buildPhase(ph){
  var sec=mk('div','ph-sec');
  sec.id='ph'+ph.n;
  var head=mk('div','ph-head');
  head.style.cssText='background:'+ph.c+'18;border-left-color:'+ph.c;
  var num=tx('div','ph-num',ph.n);
  num.style.cssText='background:'+ph.c+'25;color:'+ph.c;
  var info=mk('div');
  info.appendChild(tx('div','ph-name',ph.title));
  info.appendChild(tx('div','ph-desc',ph.desc));
  var dur=tx('div','ph-dur',ph.days);
  head.appendChild(num);head.appendChild(info);head.appendChild(dur);
  sec.appendChild(head);
  var grid=mk('div','cards');
  ph.T.forEach(function(t){grid.appendChild(buildCard(t));});
  sec.appendChild(grid);
  return sec;
}

var nav=g('pnav');
var cont=g('phases');
P.forEach(function(ph){
  var btn=tx('button',null,'Ф'+ph.n+' '+ph.title);
  btn.onclick=function(){g('ph'+ph.n).scrollIntoView({behavior:'smooth',block:'start'});};
  nav.appendChild(btn);
  cont.appendChild(buildPhase(ph));
});
updateProg();
</script>
