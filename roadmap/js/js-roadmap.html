<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Roadmap — от нуля до уверенного уровня</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D1117;--s1:#161B22;--s2:#1C2128;--bd:#30363D;--bdl:#21262D;--t1:#E6EDF3;--t2:#8B949E;--t3:#6E7681;--js:#F7DF1E}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.hdr{border-bottom:1px solid var(--bd);padding:20px 0 16px;position:sticky;top:0;background:var(--bg);z-index:100}
.hdr-in{max-width:1180px;margin:0 auto;padding:0 24px}
.hdr-top{display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:34px;height:34px;background:#20232A;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:#1a1a1a;background:var(--js)}
.logo-t{font-size:18px;font-weight:600}
.logo-s{font-size:12px;color:var(--t2);font-family:'JetBrains Mono',monospace}
.prog-w{margin-left:auto;min-width:160px;text-align:right}
.prog-lbl{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:5px}
.prog-tr{height:3px;background:var(--bd);border-radius:2px;overflow:hidden;margin-left:auto;width:180px}
.prog-fl{height:100%;width:0;background:var(--js);border-radius:2px;transition:width .5s}
.nav{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:3px 11px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn:hover{color:var(--js);border-color:var(--js)}
main{max-width:1180px;margin:0 auto;padding:36px 24px 80px}
.phase{margin-bottom:52px}
.ph-hd{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--bdl)}
.ph-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;padding:3px 8px;border-radius:4px;flex-shrink:0;margin-top:3px}
.ph-info .ph-ttl{font-size:19px;font-weight:600;color:var(--t1)}
.ph-info .ph-dsc{font-size:13px;color:var(--t2);margin-top:2px}
.ph-dur{margin-left:auto;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--t3);padding:4px 10px;border:1px solid var(--bd);border-radius:20px;flex-shrink:0;margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:var(--s1);border:1px solid var(--bdl);border-radius:8px;overflow:hidden;transition:border-color .15s}
.card:hover{border-color:var(--bd)}
.card.done .c-hd{opacity:.45}
.c-hd{padding:13px 15px;cursor:pointer;display:flex;gap:10px;align-items:flex-start}
.chk{width:17px;height:17px;border:1.5px solid var(--bd);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;cursor:pointer}
.chk.on{background:#388bfd;border-color:#388bfd;color:#fff}
.c-inf{flex:1;min-width:0}
.c-ttl{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:3px;line-height:1.3}
.c-dsc{font-size:12px;color:var(--t2);line-height:1.4}
.c-mt{display:flex;gap:8px;margin-top:7px;align-items:center}
.c-tm{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.c-cnt{font-size:11px;padding:1px 7px;background:var(--s2);border-radius:4px;color:var(--t3)}
.c-arr{font-size:10px;color:var(--t3);transition:transform .2s;margin-top:2px;flex-shrink:0}
.card.open .c-arr{transform:rotate(90deg)}
.c-bd{display:none;border-top:1px solid var(--bdl);padding:11px 15px 13px}
.card.open .c-bd{display:block}
.subs{list-style:none;margin-bottom:11px}
.subs li{font-size:12px;color:var(--t2);padding:3px 0 3px 12px;border-left:2px solid var(--bdl);margin-bottom:4px;line-height:1.55}
.ask{width:100%;padding:6px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:5px;color:var(--t2);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;text-align:left;transition:all .15s}
.ask:hover{border-color:var(--js);color:var(--js)}
@media(max-width:640px){.hdr-top{gap:12px}.prog-w{margin-left:0;text-align:left}.prog-tr{margin-left:0;width:100%}main{padding:24px 16px 60px}.ph-hd{flex-wrap:wrap}.ph-dur{margin-left:0}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-in">
    <div class="hdr-top">
      <div class="logo">
        <div class="logo-ic">JS</div>
        <div><div class="logo-t">JavaScript Roadmap</div><div class="logo-s">// от нуля до уверенного уровня</div></div>
      </div>
      <div class="prog-w">
        <div class="prog-lbl" id="plbl">0 / 0 тем</div>
        <div class="prog-tr"><div class="prog-fl" id="pfl"></div></div>
      </div>
    </div>
    <div class="nav" id="nav"></div>
  </div>
</header>
<main id="main"></main>

function tx(tag,cls,t){const e=mk(tag,cls);e.textContent=t;return e;}

const nav=document.getElementById('nav');
const main=document.getElementById('main');

D.forEach(ph=>{
  const[n,color,title,desc,dur,topics]=ph;
  const pill=tx('button','nav-btn','Ф'+n+' '+title);
  pill.addEventListener('click',()=>document.getElementById('ph'+n).scrollIntoView({behavior:'smooth',block:'start'}));
  nav.appendChild(pill);
  const section=mk('section','phase');
  section.id='ph'+n;
  const hd=mk('div','ph-hd');
  const badge=tx('span','ph-num',String(n).padStart(2,'0'));
  badge.style.cssText='background:'+color+'18;color:'+color;
  const info=mk('div','ph-info');
  info.appendChild(tx('div','ph-ttl',title));
  info.appendChild(tx('div','ph-dsc',desc));
  const durEl=tx('span','ph-dur',dur);
  hd.appendChild(badge);hd.appendChild(info);hd.appendChild(durEl);
  section.appendChild(hd);
  const grid=mk('div','grid');
  topics.forEach(t=>{
    const[id,tttl,tdsc,ttime,subs,ask]=t;
    const card=mk('div','card');
    if(DONE.has(id))card.classList.add('done');
    const cHead=mk('div','c-hd');
    const chk=mk('div','chk');
    if(DONE.has(id)){chk.classList.add('on');chk.textContent='✓';}
    const cInf=mk('div','c-inf');
    cInf.appendChild(tx('div','c-ttl',tttl));
    cInf.appendChild(tx('div','c-dsc',tdsc));
    const cMt=mk('div','c-mt');
    cMt.appendChild(tx('span','c-tm',ttime));
    cMt.appendChild(tx('span','c-cnt',subs.length+' подтем'));
    cInf.appendChild(cMt);
    const arr=tx('span','c-arr','▶');
    cHead.appendChild(chk);cHead.appendChild(cInf);cHead.appendChild(arr);
    const cBody=mk('div','c-bd');
    const ul=mk('ul','subs');
    subs.forEach(s=>{ul.appendChild(tx('li',null,s));});
    const askBtn=tx('button','ask','↗ Спросить ментора: '+ask);
    cBody.appendChild(ul);cBody.appendChild(askBtn);
    card.appendChild(cHead);card.appendChild(cBody);
    cHead.addEventListener('click',e=>{
      if(e.target===chk||chk.contains(e.target))return;
      card.classList.toggle('open');
    });
    chk.addEventListener('click',()=>{
      if(DONE.has(id))DONE.delete(id);else DONE.add(id);
      const on=DONE.has(id);
      chk.classList.toggle('on',on);
      chk.textContent=on?'✓':'';
      card.classList.toggle('done',on);
      save();updateProg();
    });
    askBtn.addEventListener('click',()=>{
      if(typeof sendPrompt==='function'){sendPrompt(ask);}
      else{
        const a=document.createElement('textarea');
        a.style.cssText='position:fixed;top:-9999px';
        document.body.appendChild(a);
        a.value=ask;a.select();
        document.execCommand('copy');
        document.body.removeChild(a);
        askBtn.textContent='✓ Скопировано!';
        setTimeout(()=>{askBtn.textContent='↗ Спросить ментора: '+ask;},2000);
      }
    });
    grid.appendChild(card);
  });
  section.appendChild(grid);
  main.appendChild(section);
});
updateProg();
</script>
</body>
</html>
