<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>React Roadmap — от нуля до middle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D1117;--s1:#161B22;--s2:#1C2128;--bd:#30363D;--bdl:#21262D;--t1:#E6EDF3;--t2:#8B949E;--t3:#6E7681;--react:#61DAFB}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);line-height:1.6;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* HEADER */
.hdr{border-bottom:1px solid var(--bd);padding:20px 0 16px;position:sticky;top:0;background:var(--bg);z-index:100}
.hdr-in{max-width:1180px;margin:0 auto;padding:0 24px}
.hdr-top{display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo-ic{width:34px;height:34px;background:#20232A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--react)}
.logo-t{font-size:18px;font-weight:600}
.logo-s{font-size:12px;color:var(--t2);font-family:'JetBrains Mono',monospace}
.prog-w{margin-left:auto;min-width:160px;text-align:right}
.prog-lbl{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:5px}
.prog-tr{height:3px;background:var(--bd);border-radius:2px;overflow:hidden;margin-left:auto;width:180px}
.prog-fl{height:100%;width:0;background:var(--react);border-radius:2px;transition:width .5s}
.nav{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:3px 11px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn:hover{color:var(--react);border-color:var(--react)}

/* MAIN */
main{max-width:1180px;margin:0 auto;padding:36px 24px 80px}

/* PHASE */
.phase{margin-bottom:52px}
.ph-hd{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--bdl)}
.ph-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;padding:3px 8px;border-radius:4px;flex-shrink:0;margin-top:3px}
.ph-info .ph-ttl{font-size:19px;font-weight:600;color:var(--t1)}
.ph-info .ph-dsc{font-size:13px;color:var(--t2);margin-top:2px}
.ph-dur{margin-left:auto;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--t3);padding:4px 10px;border:1px solid var(--bd);border-radius:20px;flex-shrink:0;margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}

/* TOPIC CARD */
.card{background:var(--s1);border:1px solid var(--bdl);border-radius:8px;overflow:hidden;transition:border-color .15s}
.card:hover{border-color:var(--bd)}
.card.done .c-hd{opacity:.45}
.c-hd{padding:13px 15px;cursor:pointer;display:flex;gap:10px;align-items:flex-start}
.chk{width:17px;height:17px;border:1.5px solid var(--bd);border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;cursor:pointer}
.chk.on{background:#388bfd;border-color:#388bfd;color:#fff}
.c-inf{flex:1;min-width:0}
.c-ttl{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:3px;line-height:1.3}
.c-dsc{font-size:12px;color:var(--t2);line-height:1.4}
.c-mt{display:flex;gap:8px;margin-top:7px;align-items:center}
.c-tm{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.c-cnt{font-size:11px;padding:1px 7px;background:var(--s2);border-radius:4px;color:var(--t3)}
.c-arr{font-size:10px;color:var(--t3);transition:transform .2s;margin-top:2px;flex-shrink:0}
.card.open .c-arr{transform:rotate(90deg)}
.c-bd{display:none;border-top:1px solid var(--bdl);padding:11px 15px 13px}
.card.open .c-bd{display:block}
.subs{list-style:none;margin-bottom:11px}
.subs li{font-size:12px;color:var(--t2);padding:3px 0 3px 12px;border-left:2px solid var(--bdl);margin-bottom:4px;line-height:1.55}
.ask{width:100%;padding:6px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:5px;color:var(--t2);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;text-align:left;transition:all .15s}
.ask:hover{border-color:var(--react);color:var(--react)}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:4px;margin-top:6px;opacity:.85}

@media(max-width:640px){
  .hdr-top{gap:12px}
  .prog-w{margin-left:0;text-align:left}
  .prog-tr{margin-left:0;width:100%}
  main{padding:24px 16px 60px}
  .ph-hd{flex-wrap:wrap}
  .ph-dur{margin-left:0}
}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-in">
    <div class="hdr-top">
      <div class="logo">
        <div class="logo-ic">⚛</div>
        <div><div class="logo-t">React Roadmap</div><div class="logo-s">// от нуля до middle</div></div>
      </div>
      <div class="prog-w">
        <div class="prog-lbl" id="plbl">0 / 0 тем</div>
        <div class="prog-tr"><div class="prog-fl" id="pfl"></div></div>
      </div>
    </div>
    <div class="nav" id="nav"></div>
  </div>
</header>
<main id="main"></main>

// Build page
const nav = document.getElementById('nav');
const main = document.getElementById('main');
const TOTAL = D.reduce((s,p)=>s+p[5].length,0);

function save() { localStorage.setItem(LS_KEY, JSON.stringify([...DONE])); }

function updateProg() {
  const d = DONE.size;
  document.getElementById('pfl').style.width = (TOTAL ? d/TOTAL*100 : 0).toFixed(1) + '%';
  document.getElementById('plbl').textContent = d + ' / ' + TOTAL + ' тем';
}

D.forEach(ph => {
  const [n, color, title, desc, dur, topics] = ph;

  // Nav pill
  const pill = document.createElement('button');
  pill.className = 'nav-btn';
  pill.textContent = 'Ф' + n + ' ' + title;
  pill.style.setProperty('--c', color);
  pill.addEventListener('click', () => {
    document.getElementById('ph'+n).scrollIntoView({ behavior:'smooth', block:'start' });
  });
  nav.appendChild(pill);

  // Phase section
  const section = document.createElement('section');
  section.className = 'phase';
  section.id = 'ph' + n;

  // Phase header
  const hd = document.createElement('div');
  hd.className = 'ph-hd';

  const badge = document.createElement('span');
  badge.className = 'ph-num';
  badge.textContent = String(n).padStart(2,'0');
  badge.style.cssText = 'background:' + color + '18;color:' + color;

  const info = document.createElement('div');
  info.className = 'ph-info';
  const ttl = document.createElement('div');
  ttl.className = 'ph-ttl';
  ttl.textContent = title;
  const dsc = document.createElement('div');
  dsc.className = 'ph-dsc';
  dsc.textContent = desc;
  info.appendChild(ttl);
  info.appendChild(dsc);

  const durEl = document.createElement('span');
  durEl.className = 'ph-dur';
  durEl.textContent = dur;

  hd.appendChild(badge);
  hd.appendChild(info);
  hd.appendChild(durEl);
  section.appendChild(hd);

  // Topics grid
  const grid = document.createElement('div');
  grid.className = 'grid';

  topics.forEach(t => {
    const [id, tttl, tdsc, ttime, subs, ask] = t;

    const card = document.createElement('div');
    card.className = 'card' + (DONE.has(id) ? ' done' : '');

    // Card head
    const cHead = document.createElement('div');
    cHead.className = 'c-hd';

    const chk = document.createElement('div');
    chk.className = 'chk' + (DONE.has(id) ? ' on' : '');
    chk.textContent = DONE.has(id) ? '✓' : '';

    const cInf = document.createElement('div');
    cInf.className = 'c-inf';

    const cTtl = document.createElement('div');
    cTtl.className = 'c-ttl';
    cTtl.textContent = tttl;

    const cDsc = document.createElement('div');
    cDsc.className = 'c-dsc';
    cDsc.textContent = tdsc;

    const cMt = document.createElement('div');
    cMt.className = 'c-mt';
    const cTm = document.createElement('span');
    cTm.className = 'c-tm';
    cTm.textContent = ttime;
    const cCnt = document.createElement('span');
    cCnt.className = 'c-cnt';
    cCnt.textContent = subs.length + ' подтем';
    cMt.appendChild(cTm);
    cMt.appendChild(cCnt);

    const arr = document.createElement('span');
    arr.className = 'c-arr';
    arr.textContent = '▶';

    cInf.appendChild(cTtl);
    cInf.appendChild(cDsc);
    cInf.appendChild(cMt);
    cHead.appendChild(chk);
    cHead.appendChild(cInf);
    cHead.appendChild(arr);

    // Card body
    const cBody = document.createElement('div');
    cBody.className = 'c-bd';

    const ul = document.createElement('ul');
    ul.className = 'subs';
    subs.forEach(s => {
      const li = document.createElement('li');
      li.textContent = s;
      ul.appendChild(li);
    });

    const askBtn = document.createElement('button');
    askBtn.className = 'ask';
    askBtn.textContent = '↗ Спросить ментора: ' + ask;

    cBody.appendChild(ul);
    cBody.appendChild(askBtn);

    card.appendChild(cHead);
    card.appendChild(cBody);
    grid.appendChild(card);

    // Events
    cHead.addEventListener('click', e => {
      if (e.target === chk || chk.contains(e.target)) return;
      card.classList.toggle('open');
    });

    chk.addEventListener('click', () => {
      if (DONE.has(id)) DONE.delete(id);
      else DONE.add(id);
      const on = DONE.has(id);
      chk.classList.toggle('on', on);
      chk.textContent = on ? '✓' : '';
      card.classList.toggle('done', on);
      save();
      updateProg();
    });

    askBtn.addEventListener('click', () => {
      if (typeof sendPrompt === 'function') {
        sendPrompt(ask);
      } else {
        const area = document.createElement('textarea');
        area.style.cssText = 'position:fixed;top:-9999px';
        document.body.appendChild(area);
        area.value = ask;
        area.select();
        document.execCommand('copy');
        document.body.removeChild(area);
        askBtn.textContent = '✓ Скопировано!';
        setTimeout(() => { askBtn.textContent = '↗ Спросить ментора: ' + ask; }, 2000);
      }
    });
  });

  section.appendChild(grid);
  main.appendChild(section);
});

updateProg();
</script>
</body>
</html>
